version: "3.9"

services:
  # ===== Observability Stack =====
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: order-jaeger
    ports:
      - "6831:6831/udp"
      - "16686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  prometheus:
    image: prom/prometheus:latest
    container_name: order-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: order-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - app-logs:/var/log/order-service
    depends_on:
      - jaeger

  # ===== SignOz Stack (Optional) =====
  signoz-zookeeper:
    image: library/zookeeper:latest
    container_name: signoz-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOO_CFG_EXTRA: ""
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 3

  signoz-clickhouse:
    image: clickhouse/clickhouse-server:24.2-alpine
    container_name: signoz-clickhouse
    ports:
      - "9000:9000"
      - "8123:8123"
    volumes:
      - signoz-clickhouse-data:/var/lib/clickhouse/
    depends_on:
      signoz-zookeeper:
        condition: service_healthy

  signoz:
    image: signoz/signoz:v0.117.1
    container_name: signoz
    ports:
      - "3301:3301"
    volumes:
      - signoz-data:/var/lib/signoz/
    environment:
      CLICKHOUSE_ADDR: "signoz-clickhouse:9000"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      QUERY_SERVICE_CLICKHOUSE_DATASOURCE: "tcp://signoz-clickhouse:9000/?database=signoz"
    depends_on:
      signoz-clickhouse:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    container_name: order-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: order
      POSTGRES_PASSWORD: order123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order -d orderdb"]
      interval: 5s
  kafka:
    image: apache/kafka:3.7.0
    container_name: order-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: order-service
    ports:
      - "8081:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: order
      DB_PASSWORD: order123
      DB_NAME: orderdb
      DB_SSLMODE: disable
      SERVER_PORT: 8080
      LOG_LEVEL: info
      LOG_FILE_PATH: /var/log/order-service/app.log
      OTEL_SERVICE_NAME: order-service
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4318
      EVENT_BUS_TYPE: kafka
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: order-events
      KAFKA_CONSUMER_GROUP: order-projection
    volumes:
      - app-logs:/var/log/order-service
    depends_on:
      otel-collector:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  pgdata:
  kafkadata:
  app-logs:
  prometheus-data:
  signoz-data:
  signoz-clickhouse-data:
